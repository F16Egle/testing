<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Classroom</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --cb-blue: #0077c8;
            --cb-dark: #222222;
            --cb-bg: #f5f7f8;
            --cb-border: #d1d1d1;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: "Open Sans", Arial, sans-serif; overflow: hidden; }

        /* Background Layer */
        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('BG1.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        /* Launcher Icon (Bottom Left like a real tool) */
        #calc-launcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #ededed;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
        }
        #calc-launcher img { width: 30px; opacity: 0.7; }

        /* Draggable Desmos Chat Window */
        #desmos-window {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 350px;
            height: 500px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: none; /* Hidden by default */
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        #desmos-header {
            background: #f5f5f5;
            padding: 10px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            font-size: 12px;
            font-weight: bold;
            color: #666;
        }

        #close-btn { cursor: pointer; color: #999; font-size: 16px; }

        /* Message List (The "Equation" List) */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: #fff;
        }

        .equation-row {
            display: flex;
            align-items: flex-start;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }

        .eq-num { color: #888; min-width: 25px; font-size: 12px; padding-top: 2px; }
        .eq-content { color: #333; word-break: break-all; }
        .eq-content b { color: var(--cb-blue); font-weight: normal; }

        /* Bottom Input */
        #input-area {
            padding: 10px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 5px;
            background: #fff;
        }

        #message-input {
            flex: 1;
            border: 1px solid #ddd;
            padding: 8px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }

        #send-btn { background: #47a047; color: white; border: none; padding: 0 15px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg-container"></div>

<div id="calc-launcher" onclick="toggleChat()">
    <img src="https://www.desmos.com/assets/img/apps/calculator/favicon.ico" alt="calc">
</div>

<div id="desmos-window">
    <div id="desmos-header" id="drag-handle">
        <span>Graphing Calculator</span>
        <span id="close-btn" onclick="toggleChat()">✖</span>
    </div>
    
    <div id="messages">
        </div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="y = expression">
        <button id="send-btn">➔</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHqNfFZKL0h6m92IbDJU3MuiWnTlb7qPs",
    authDomain: "chat-a8dc8.firebaseapp.com",
    databaseURL: "https://chat-a8dc8-default-rtdb.firebaseio.com",
    projectId: "chat-a8dc8",
    storageBucket: "chat-a8dc8.firebasestorage.app",
    messagingSenderId: "702869894744",
    appId: "1:702869894744:web:57f6d15a81630688d83c2d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  const win = document.getElementById('desmos-window');
  const msgContainer = document.getElementById('messages');
  const msgInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  let msgCount = 0;

  // Toggle Visibility
  window.toggleChat = function() {
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
  };

  // Dragging Logic
  let isDragging = false;
  const header = document.getElementById('desmos-header');
  header.onmousedown = (e) => {
    isDragging = true;
    let offsetX = e.clientX - win.offsetLeft;
    let offsetY = e.clientY - win.offsetTop;
    document.onmousemove = (e) => {
        if (isDragging) {
            win.style.left = (e.clientX - offsetX) + 'px';
            win.style.top = (e.clientY - offsetY) + 'px';
        }
    };
  };
  document.onmouseup = () => isDragging = false;

  // Sending
  const username = "User" + Math.floor(Math.random() * 99);
  function sendMessage() {
    if (msgInput.value.trim() !== "") {
      push(messagesRef, {
        user: username,
        text: msgInput.value,
        time: serverTimestamp()
      });
      msgInput.value = "";
    }
  }

  onChildAdded(messagesRef, (data) => {
    msgCount++;
    const m = data.val();
    const row = document.createElement('div');
    row.className = 'equation-row';
    row.innerHTML = `
        <div class="eq-num">${msgCount}</div>
        <div class="eq-content"><b>${m.user}:</b> ${m.text}</div>
    `;
    msgContainer.appendChild(row);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  });

  sendBtn.onclick = sendMessage;
  msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

</script>

</body>
</html>
