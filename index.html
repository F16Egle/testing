<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Classroom</title>
    <style>
        :root { --cb-blue: #0077c8; --cb-dark: #222222; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }

        /* The Background Layer */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; /* Fallback color so it's not white */
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 0.5s ease-in-out;
            cursor: pointer;
        }

        /* Launcher Icon */
        #calc-launcher {
            position: fixed;
            bottom: 15px; left: 15px;
            width: 45px; height: 45px;
            background: #fff; border: 1px solid #ccc; border-radius: 6px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        /* Chat/Desmos Window */
        #desmos-window {
            position: absolute;
            top: 50px; left: 50px;
            width: 380px; height: 550px;
            background: white; border: 1px solid #ccc;
            display: none; flex-direction: column;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); z-index: 1000;
        }

        #desmos-header { background: #ededed; padding: 10px; cursor: move; display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; }
        #graph-area { height: 180px; background: #fff; position: relative; border-bottom: 1px solid #ddd; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 5px; }
        .eq-row { display: flex; padding: 8px; border-bottom: 1px solid #eee; align-items: center; }
        .eq-icon { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #2d70b3; margin-right: 10px; text-align: center; font-size: 12px; }
        #input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #ccc; }
        #message-input { flex: 1; padding: 8px; border: 1px solid #ccc; }
        #send-btn { background: #2d70b3; color: white; border: none; padding: 0 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div id="calc-launcher" onclick="toggleChat()">
    <img src="https://www.desmos.com/assets/img/apps/calculator/favicon.ico" width="28">
</div>

<div id="desmos-window">
    <div id="desmos-header">
        <span>Graphing Calculator</span>
        <span onclick="toggleChat()" style="cursor:pointer">✖</span>
    </div>
    <div id="graph-area">
        <div id="wave-container" style="position:absolute; width:100%; height:100%;"></div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type /username [name] or /tickle">
        <button id="send-btn">Post</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHqNfFZKL0h6m92IbDJU3MuiWnTlb7qPs",
        authDomain: "chat-a8dc8.firebaseapp.com",
        databaseURL: "https://chat-a8dc8-default-rtdb.firebaseio.com",
        projectId: "chat-a8dc8",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    // --- BACKGROUND CYCLING ---
    let bgIndex = 1;
    const bgLayer = document.getElementById('bg-layer');
    
    function changeBG() {
        // Ensure pathing is relative to current directory
        bgLayer.style.backgroundImage = `url('BG${bgIndex}.png')`;
        bgIndex = (bgIndex % 4) + 1;
    }
    
    bgLayer.onclick = changeBG;
    changeBG(); // Set first background
    setInterval(changeBG, 10000); // Auto-change every 10 seconds

    // --- WINDOW CONTROLS ---
    const win = document.getElementById('desmos-window');
    window.toggleChat = () => {
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    };

    // Dragging
    let isDragging = false, startX, startY;
    document.getElementById('desmos-header').onmousedown = (e) => {
        isDragging = true;
        startX = e.clientX - win.offsetLeft;
        startY = e.clientY - win.offsetTop;
    };
    document.onmousemove = (e) => {
        if (!isDragging) return;
        win.style.left = (e.clientX - startX) + 'px';
        win.style.top = (e.clientY - startY) + 'px';
    };
    document.onmouseup = () => isDragging = false;

    // --- CHAT LOGIC ---
    let currentUsername = "Student" + Math.floor(Math.random() * 99);
    const msgInput = document.getElementById('message-input');
    const msgBox = document.getElementById('messages');
    let msgCount = 0;

    function handleSend() {
        const text = msgInput.value.trim();
        if (!text) return;

        if (text.startsWith('/username ')) {
            currentUsername = text.split('/username ')[1].trim();
            msgInput.value = "";
            return;
        }

        if (text === '/tickle') {
            doTickle();
            msgInput.value = "";
            return;
        }

        push(messagesRef, { u: currentUsername, t: text, s: serverTimestamp() });
        msgInput.value = "";
    }

    function doTickle() {
        // Shake the window
        win.animate([
            { transform: 'translateX(-5px)' },
            { transform: 'translateX(5px)' }
        ], { duration: 100, iterations: 10 });

        // Add a "funny wave" circle
        const circle = document.createElement('div');
        circle.style.cssText = "position:absolute; top:50%; left:50%; width:10px; height:10px; background:#2d70b3; border-radius:50%; transform:translate(-50%,-50%);";
        document.getElementById('wave-container').appendChild(circle);
        
        circle.animate([
            { width: '0px', height: '0px', opacity: 1 },
            { width: '300px', height: '100px', opacity: 0 }
        ], { duration: 800 });

        setTimeout(() => circle.remove(), 800);
    }

    onChildAdded(messagesRef, (snap) => {
        msgCount++;
        const data = snap.val();
        const div = document.createElement('div');
        div.className = 'eq-row';
        div.innerHTML = `<div class="eq-icon">${msgCount}</div><div><b>${data.u}:</b> ${data.t}</div>`;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    });

    document.getElementById('send-btn').onclick = handleSend;
    msgInput.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };

</script>
</body>
</html>
