<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Classroom</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --cb-blue: #0077c8;
            --cb-dark: #222222;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: "Open Sans", Arial, sans-serif; overflow: hidden; cursor: pointer; }

        /* Background cycling through BG1.png to BG4.png */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: background-image 0.2s ease-in-out;
        }

        /* Launcher Icon */
        #calc-launcher {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #calc-launcher img { width: 28px; }

        /* Draggable Desmos Window */
        #desmos-window {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 380px;
            height: 550px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 2px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 1000;
            cursor: default;
        }

        #desmos-header {
            background: #ededed;
            padding: 8px 12px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #ccc;
        }

        /* The Blank Graph Area */
        #graph-area {
            height: 180px;
            background-color: #fff;
            background-image: 
                linear-gradient(to right, #f0f0f0 1px, transparent 1px),
                linear-gradient(to bottom, #f0f0f0 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            border-bottom: 1px solid #ccc;
        }
        /* Axis lines */
        #graph-area::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px; background: #999;
        }
        #graph-area::after {
            content: '';
            position: absolute;
            left: 50%; top: 0; width: 2px; height: 100%; background: #999;
        }

        /* Message List */
        #messages {
            flex: 1;
            overflow-y: auto;
            background: #fff;
        }

        .eq-row {
            display: flex;
            padding: 8px 10px;
            border-bottom: 1px solid #f1f1f1;
            align-items: center;
        }

        /* The colored circle/icon area in Desmos */
        .eq-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #2d70b3;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #2d70b3;
            font-weight: bold;
        }

        .eq-text { font-family: 'Times New Roman', serif; font-size: 15px; flex: 1; }
        .eq-text b { color: #000; margin-right: 5px; }

        /* Input Area */
        #input-area {
            padding: 10px;
            border-top: 1px solid #ccc;
            display: flex;
            gap: 5px;
        }

        #message-input {
            flex: 1;
            border: 1px solid #ccc;
            padding: 8px;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        #send-btn { background: #2d70b3; color: white; border: none; padding: 0 12px; cursor: pointer; border-radius: 2px; }
    </style>
</head>
<body>

<div id="bg-layer" onclick="cycleBG()"></div>

<div id="calc-launcher" onclick="toggleChat()">
    <img src="https://www.desmos.com/assets/img/apps/calculator/favicon.ico">
</div>

<div id="desmos-window">
    <div id="desmos-header">
        <span>Graphing Calculator</span>
        <span onclick="toggleChat()" style="cursor:pointer">✖</span>
    </div>
    
    <div id="graph-area"></div>

    <div id="messages"></div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="y = f(x)">
        <button id="send-btn">Post</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHqNfFZKL0h6m92IbDJU3MuiWnTlb7qPs",
    authDomain: "chat-a8dc8.firebaseapp.com",
    databaseURL: "https://chat-a8dc8-default-rtdb.firebaseio.com",
    projectId: "chat-a8dc8",
    storageBucket: "chat-a8dc8.firebasestorage.app",
    messagingSenderId: "702869894744",
    appId: "1:702869894744:web:57f6d15a81630688d83c2d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  // Background Cycling Logic
  let bgIndex = 1;
  const bgLayer = document.getElementById('bg-layer');
  bgLayer.style.backgroundImage = `url('BG1.png')`;

  window.cycleBG = function() {
    bgIndex = (bgIndex % 4) + 1;
    bgLayer.style.backgroundImage = `url('BG${bgIndex}.png')`;
  };

  // Window Logic
  const win = document.getElementById('desmos-window');
  window.toggleChat = function() {
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
  };

  // Dragging
  const header = document.getElementById('desmos-header');
  let isDown = false, offset = [0,0];
  header.addEventListener('mousedown', (e) => {
    isDown = true;
    offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY];
  });
  document.addEventListener('mouseup', () => isDown = false);
  document.addEventListener('mousemove', (e) => {
    if (isDown) {
        win.style.left = (e.clientX + offset[0]) + 'px';
        win.style.top  = (e.clientY + offset[1]) + 'px';
    }
  });

  // Messaging Logic
  const msgInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const msgContainer = document.getElementById('messages');
  const username = "Student" + Math.floor(Math.random() * 99);
  let count = 0;

  function send() {
    if (msgInput.value.trim()) {
        push(messagesRef, { u: username, t: msgInput.value, s: serverTimestamp() });
        msgInput.value = "";
    }
  }

  onChildAdded(messagesRef, (snap) => {
    count++;
    const data = snap.val();
    const row = document.createElement('div');
    row.className = 'eq-row';
    row.innerHTML = `
        <div class="eq-icon">${count}</div>
        <div class="eq-text"><b>${data.u}:</b> ${data.t}</div>
    `;
    msgContainer.appendChild(row);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  });

  sendBtn.onclick = send;
  msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
