<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #0084ff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 18px; max-width: 70%; font-size: 14px; }
        .received { background: #e4e6eb; align-self: flex-start; }
        .sent { background: #0084ff; color: white; align-self: flex-end; }
        #input-area { border-top: 1px solid #ddd; padding: 10px; display: flex; }
        #message-input { flex: 1; border: none; padding: 10px; border-radius: 20px; background: #f0f2f5; outline: none; }
        #send-btn { background: none; border: none; color: #0084ff; font-weight: bold; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">GitHub Live Chat</div>
    <div id="messages">
        <div class="message received">Hey! How's the project going?</div>
    </div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const msgContainer = document.getElementById('messages');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    function sendMessage() {
        if (input.value.trim() !== "") {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'sent');
            msgDiv.textContent = input.value;
            msgContainer.appendChild(msgDiv);
            
            // Auto-scroll to bottom
            msgContainer.scrollTop = msgContainer.scrollHeight;
            input.value = "";
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
