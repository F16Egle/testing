<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHqNfFZKL0h6m92IbDJU3MuiWnTlb7qPs",
    authDomain: "chat-a8dc8.firebaseapp.com",
    databaseURL: "https://chat-a8dc8-default-rtdb.firebaseio.com",
    projectId: "chat-a8dc8",
    storageBucket: "chat-a8dc8.firebasestorage.app",
    messagingSenderId: "702869894744",
    appId: "1:702869894744:web:57f6d15a81630688d83c2d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  // --- BACKGROUND LOGIC ---
  let bgIndex = 1;
  const bgLayer = document.getElementById('bg-layer');
  bgLayer.style.backgroundImage = `url('BG1.png')`;

  window.cycleBG = function() {
    bgIndex = (bgIndex % 4) + 1;
    bgLayer.style.backgroundImage = `url('BG${bgIndex}.png')`;
  };

  // Change background automatically every 30 seconds
  setInterval(window.cycleBG, 30000);

  // --- WINDOW & DRAG LOGIC ---
  const win = document.getElementById('desmos-window');
  window.toggleChat = function() {
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
  };

  const header = document.getElementById('desmos-header');
  let isDown = false, offset = [0,0];
  header.addEventListener('mousedown', (e) => {
    isDown = true;
    offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY];
  });
  document.addEventListener('mouseup', () => isDown = false);
  document.addEventListener('mousemove', (e) => {
    if (isDown) {
        win.style.left = (e.clientX + offset[0]) + 'px';
        win.style.top  = (e.clientY + offset[1]) + 'px';
    }
  });

  // --- CHAT & COMMAND LOGIC ---
  const msgInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const msgContainer = document.getElementById('messages');
  const graphArea = document.getElementById('graph-area');
  
  let currentUsername = "Student" + Math.floor(Math.random() * 99);
  let count = 0;

  function send() {
    const val = msgInput.value.trim();
    if (!val) return;

    // COMMAND: /username
    if (val.startsWith('/username ')) {
        currentUsername = val.replace('/username ', '').trim() || currentUsername;
        msgInput.value = "";
        return;
    }

    // COMMAND: /tickle
    if (val === '/tickle') {
        tickleGraph();
        msgInput.value = "";
        return;
    }

    push(messagesRef, { u: currentUsername, t: val, s: serverTimestamp() });
    msgInput.value = "";
  }

  // --- TICKLE EFFECT ---
  function tickleGraph() {
    // Create a temporary "wave" element
    const wave = document.createElement('div');
    wave.style.position = 'absolute';
    wave.style.width = '100%';
    wave.style.height = '100%';
    wave.style.top = '0';
    wave.style.left = '0';
    wave.style.pointerEvents = 'none';
    wave.style.border = '2px solid #2d70b3';
    wave.style.borderRadius = '50%';
    wave.style.opacity = '0.7';
    
    // Simple CSS keyframe injection for the "wobble"
    wave.animate([
      { transform: 'scale(0.8) translateY(0px)', opacity: 1 },
      { transform: 'scale(1.1) translateY(-20px)', opacity: 0.5 },
      { transform: 'scale(0.9) translateY(20px)', opacity: 0.5 },
      { transform: 'scale(1) translateY(0px)', opacity: 0 }
    ], {
      duration: 1000,
      easing: 'ease-in-out'
    });

    graphArea.appendChild(wave);
    
    // Also "shake" the whole window for 1 second
    win.animate([
        { transform: 'translateX(0px)' },
        { transform: 'translateX(-5px)' },
        { transform: 'translateX(5px)' },
        { transform: 'translateX(0px)' }
    ], { duration: 100, iterations: 10 });

    setTimeout(() => wave.remove(), 1000);
  }

  onChildAdded(messagesRef, (snap) => {
    count++;
    const data = snap.val();
    const row = document.createElement('div');
    row.className = 'eq-row';
    row.innerHTML = `
        <div class="eq-icon">${count}</div>
        <div class="eq-text"><b>${data.u || "User"}:</b> ${data.t}</div>
    `;
    msgContainer.appendChild(row);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  });

  sendBtn.onclick = send;
  msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
