<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Community Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 450px; height: 80vh; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #0084ff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; position: relative; font-size: 0.95rem; line-height: 1.4; }
        .msg-info { font-size: 0.7rem; margin-bottom: 4px; color: #65676b; display: block; }
        
        .received { background: #e4e6eb; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
        #username-input { width: 80px; border: 1px solid #ddd; border-radius: 20px; padding: 8px 12px; outline: none; font-size: 0.8rem; }
        #message-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 15px; outline: none; }
        #send-btn { background: #0084ff; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background: #0073e6; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Global Chat</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="username-input" placeholder="Name" maxlength="10">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script type="module">
  // Import Firebase SDKs from CDN
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Your Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBHqNfFZKL0h6m92IbDJU3MuiWnTlb7qPs",
    authDomain: "chat-a8dc8.firebaseapp.com",
    projectId: "chat-a8dc8",
    storageBucket: "chat-a8dc8.firebasestorage.app",
    messagingSenderId: "702869894744",
    appId: "1:702869894744:web:57f6d15a81630688d83c2d"
  };

  // Initialize
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  const msgContainer = document.getElementById('messages');
  const userInput = document.getElementById('username-input');
  const msgInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  // Set a default temporary username
  userInput.value = "Guest" + Math.floor(Math.random() * 100);

  // Send function
  function sendMessage() {
    const text = msgInput.value.trim();
    const user = userInput.value.trim() || "Anonymous";

    if (text !== "") {
      push(messagesRef, {
        username: user,
        text: text,
        timestamp: serverTimestamp()
      });
      msgInput.value = "";
    }
  }

  // UI rendering
  onChildAdded(messagesRef, (data) => {
    const msg = data.val();
    const msgDiv = document.createElement('div');
    
    // Determine if it's "us" or "them" (simple check based on name)
    const isMe = msg.username === userInput.value;
    msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
    
    msgDiv.innerHTML = `
        <span class="msg-info">${msg.username}</span>
        <div>${msg.text}</div>
    `;
    
    msgContainer.appendChild(msgDiv);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  });

  sendBtn.onclick = sendMessage;
  msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
